<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cacao & Co. | Artisan Chocolate</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PRELOADER -->
  <div class="preloader" id="preloader">
    <div class="preloader__inner">
      <span class="preloader__logo">Cacao & Co.</span>
    </div>
  </div>

  <!-- NAVIGATION -->
  <nav class="nav" id="nav">
    <a href="#" class="nav__logo">Cacao & Co.</a>
    <ul class="nav__links">
      <!-- Add menu links: Our Story, Products, Process, Contact -->
    </ul>
    <a href="#" class="nav__cta">Shop Now</a>
  </nav>

  <!-- HERO: PARALLAX SCENE -->
  <section class="hero" id="hero">
    <div class="hero__parallax">
      <div class="hero__layer hero__layer--bg" data-speed="0.2">
        <!-- Background texture layer -->
      </div>
      <div class="hero__layer hero__layer--ingredients" data-speed="0.5">
        <!-- Floating ingredients (cocoa beans, leaves) -->
      </div>
      <div class="hero__layer hero__layer--product" data-speed="0.8">
        <!-- Hero product image -->
      </div>
      <div class="hero__layer hero__layer--content" data-speed="1.0">
        <div class="hero__content">
          <!-- Add hero headline, subheading, and CTA button -->
        </div>
      </div>
    </div>
  </section>

  <!-- BRAND STORY -->
  <section class="section section--story" id="story">
    <div class="story__grid">
      <!-- Add image on left, text content on right -->
      <!-- Include: eyebrow text, title, description paragraphs -->
    </div>
  </section>

  <!-- PRODUCT SHOWCASE -->
  <section class="section section--products" id="products">
    <div class="section__header">
      <!-- Add eyebrow text and section title -->
    </div>
    <div class="products__grid" id="products-grid">
      <!-- Product cards injected by JavaScript -->
    </div>
  </section>

  <!-- PROCESS: BEAN TO BAR -->
  <section class="section section--process" id="process">
    <div class="section__header">
      <!-- Add eyebrow text and section title -->
    </div>
    <div class="process__steps">
      <!-- Add 4 step cards: Source, Roast, Craft, Taste -->
    </div>
  </section>

  <!-- TESTIMONIAL -->
  <section class="section section--testimonial" id="testimonial">
    <!-- Add large blockquote with customer name and title -->
  </section>

  <!-- CTA / NEWSLETTER -->
  <section class="section section--cta" id="cta">
    <!-- Add headline, description, email input + submit button -->
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__grid">
      <!-- Add 3-column link grid: Shop, Company, Connect -->
    </div>
    <div class="footer__bottom">
      <!-- Add copyright text -->
    </div>
  </footer>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
