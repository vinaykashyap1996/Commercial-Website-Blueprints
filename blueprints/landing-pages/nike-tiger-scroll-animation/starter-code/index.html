<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand | Scroll Animation Landing Page</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Archivo+Narrow:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PRELOADER -->
  <div class="preloader" id="preloader">
    <div class="preloader__inner">
      <span class="preloader__logo">BRAND</span>
      <div class="preloader__bar">
        <div class="preloader__fill" id="preloader-fill"></div>
      </div>
      <span class="preloader__count" id="preloader-count">0%</span>
    </div>
  </div>

  <!-- NAVIGATION -->
  <nav class="nav" id="nav">
    <!-- Add your logo here -->
  </nav>

  <!-- HERO: SCROLL ANIMATION -->
  <section class="hero" id="hero">
    <div class="hero__sticky">
      <canvas id="ambient-canvas" aria-hidden="true"></canvas>
      <canvas id="tiger-canvas" aria-hidden="true"></canvas>
      <div class="hero__content">
        <!-- Add your hero title and scroll cue here -->
      </div>
    </div>
  </section>

  <!-- PRODUCT INTRO -->
  <section class="section section--intro" id="intro">
    <!-- Add eyebrow, title, description, and CTA buttons -->
  </section>

  <!-- PRODUCT CAROUSEL -->
  <section class="section section--carousel" id="carousel">
    <div class="carousel__header">
      <!-- Add title and arrow buttons -->
    </div>
    <div class="carousel__track" id="carousel-track">
      <!-- Cards injected by JavaScript -->
    </div>
  </section>

  <!-- FEATURED BANNER -->
  <section class="section section--featured" id="featured">
    <!-- Add featured image and headline -->
  </section>

  <!-- CATEGORY GRID -->
  <section class="section section--essentials" id="essentials">
    <!-- Add title and category cards -->
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <!-- Add footer grid and copyright -->
  </footer>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
